services:
  zenn-bot:
    container_name: zenn-bot
    image: juanfu26/zenn-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID}
      - LOGIN_USER=${LOGIN_USER}
      - LOGIN_PASS=${LOGIN_PASS}
      - LOGIN_URL=${LOGIN_URL}
      - ACTION_URL=${ACTION_URL}
      - WORK_MINUTES_REGULAR=${WORK_MINUTES_REGULAR}
      - WORK_MINUTES_LUNCH=${WORK_MINUTES_LUNCH}
      - WORK_MINUTES_FRIDAY=${WORK_MINUTES_FRIDAY}
      - WORK_MINUTES_SUMMER=${WORK_MINUTES_SUMMER}
      - WORK_RANDOM_DELAY_MAX=${WORK_RANDOM_DELAY_MAX}
      - SUMMER_PERIOD_START=${SUMMER_PERIOD_START}
      - SUMMER_PERIOD_END=${SUMMER_PERIOD_END}
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
